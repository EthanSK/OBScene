name: Deploy landing page

on:
  push:
    branches:
      - main
    paths:
      - site/**
      - OBScene/Info.plist
      - scripts/sync-version.sh
      - .github/workflows/pages.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync landing page version metadata
        run: ./scripts/sync-version.sh

      - name: Validate landing page files
        run: |
          test -f site/index.html
          test -f site/styles.css
          test -f site/version.json
          test -f site/apple-touch-icon.png
          test -f site/favicon-16.png
          test -f site/favicon-32.png
          test -f site/assets/icon.png
          test -f site/assets/icon-256.png
          test -f site/assets/screenshot-settings.png

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
